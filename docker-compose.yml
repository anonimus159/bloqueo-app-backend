version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-codecraft_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-SecurePass123!}
      POSTGRES_DB: ${DB_NAME:-device_control}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Ejecuta el schema inicial automáticamente al crear la DB
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_USER: ${DB_USER:-codecraft_admin}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-device_control}
      DB_PASSWORD: ${DB_PASS:-SecurePass123!}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-un-secreto-muy-seguro-para-produccion}
    depends_on:
      - db
    volumes:
      # Montar credenciales de firebase y llaves del server
      - ./firebase-service-account.json:/app/firebase-service-account.json
      - ./server_keys.json:/app/server_keys.json

volumes:
  pgdata:
