<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f7fff' stroke-width='2'><rect x='5' y='2' width='14' height='20' rx='2'/><line x1='12' y1='18' x2='12' y2='18'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema de gestión de ventas a crédito y control de dispositivos móviles." />
    <title>FinControl — Sistema de Créditos Móviles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-overlay" style="display:none; position:fixed; inset:0; background:rgba(7, 8, 15, 0.98); color:#f43f5e; padding:30px; z-index:99999; font-family:'Inter', sans-serif; overflow:auto; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
      <div style="max-width:600px; background:#111322; padding:40px; border-radius:16px; border:1px solid #1e293b; box-shadow:0 20px 25px -5px rgba(0,0,0,0.5);">
        <div style="background:rgba(244,63,94,0.1); color:#f43f5e; width:60px; height:60px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:20px; font-size:24px; font-weight:bold;">⚠</div>
        <h2 style="margin:0 0 10px 0; color:#f8fafc; font-size:20px;">Fallo en la aplicación (Error Detectado)</h2>
        <p style="color:#94a3b8; font-size:14px; margin-bottom:20px; line-height:1.5;">Se detectó un error al iniciar la página web, lo que causaba que la pantalla quedara en blanco. Esto suele deberse a datos locales antiguos o incompatibles.</p>
        <pre id="error-text" style="background:#07080f; color:#94a3b8; padding:15px; border-radius:8px; font-size:12px; text-align:left; overflow:auto; max-height:200px; border:1px solid #1e293b; font-family:'JetBrains Mono', monospace; margin-bottom:24px;"></pre>
        <div style="display:flex; gap:12px; justify-content:center;">
          <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload();" style="background:#4f7fff; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; transition:opacity 0.2s;">Limpiar Datos Locales y Recargar</button>
          <button onclick="location.reload();" style="background:#1e293b; color:#94a3b8; border:1px solid #334155; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; transition:opacity 0.2s;">Reintentar</button>
        </div>
      </div>
    </div>
    <script>
      // Escuchar todos los errores del sistema (incluyendo recursos) para diagnóstico completo
      window.addEventListener('error', function(e) {
        var overlay = document.getElementById('error-overlay');
        var text = document.getElementById('error-text');
        if (overlay && text) {
          overlay.style.display = 'flex';
          var details = [];
          details.push("Tipo de Evento: " + e.type);
          if (e.message) details.push("Mensaje: " + e.message);
          if (e.filename) details.push("Archivo: " + e.filename);
          if (e.lineno) details.push("Línea: " + e.lineno + ", Col: " + e.colno);
          if (e.error) {
            details.push("Nombre de Error: " + e.error.name);
            details.push("Detalle de Error: " + e.error.message);
            if (e.error.stack) details.push("Stack Trace:\n" + e.error.stack);
          }
          if (e.target && e.target !== window) {
            details.push("Elemento Fallido: <" + e.target.tagName + ">");
            if (e.target.src) details.push("URL Origen (src): " + e.target.src);
            if (e.target.href) details.push("URL Destino (href): " + e.target.href);
          }
          text.innerText = details.join("\n");
        }
      }, true); // Captura para errores de red en assets

      // Escuchar también promesas no capturadas que fallen en ejecución
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        var msg = reason instanceof Error ? reason.message : String(reason);
        var stack = reason instanceof Error && reason.stack ? reason.stack : '';
        
        var overlay = document.getElementById('error-overlay');
        var text = document.getElementById('error-text');
        if (overlay && text) {
          overlay.style.display = 'flex';
          text.innerText = 'Promesa no controlada fallida: ' + msg + (stack ? '\n\nStack:\n' + stack : '');
        }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
